syntax = "proto3";

package auth;

option go_package = "backend/common/protocol/authpb";

message VerifyTokenRequest {
  string access_token = 1;
}

message VerifyTokenResponse {
  int64 user_id = 1;
  string role = 2;
  string username = 3;
}

message ErrorResponse {
  int32 code = 1;
  string message = 2;
}

service AuthService {
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
}

