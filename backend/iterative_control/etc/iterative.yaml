# 日志配置
Log:
  Level: debug                    # 日志级别: debug, info, warn, error, fatal
  Mode: console                     # 输出模式: console, file, volume
  Encoding: json                 # 输出格式: json, plain
  Path: ./logs                   # 日志文件路径（当Mode为file时）
  MaxSize: 10                    # 单个日志文件最大大小(MB)
  MaxBackups: 5                  # 保留旧文件的最大个数
  MaxAge: 30                     # 保留旧文件的最大天数
  Compress: true                 # 是否压缩旧文件

